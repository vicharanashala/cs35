<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="auto">
  <defs>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5E7A5A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c9b082" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="dot-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#0D1117" rx="12"/>

  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#c9b082" font-weight="600" letter-spacing="2">TECH STACK RADAR</text>

  <!-- Concentric rings (adopt, trial, assess) -->
  <circle cx="300" cy="210" r="150" fill="none" stroke="#5E7A5A" stroke-width="0.5" opacity="0.3"/>
  <circle cx="300" cy="210" r="110" fill="none" stroke="#5E7A5A" stroke-width="0.5" opacity="0.3"/>
  <circle cx="300" cy="210" r="70" fill="none" stroke="#5E7A5A" stroke-width="0.5" opacity="0.3"/>
  <circle cx="300" cy="210" r="30" fill="none" stroke="#5E7A5A" stroke-width="0.5" opacity="0.3"/>

  <!-- Axis lines -->
  <line x1="300" y1="60" x2="300" y2="360" stroke="#5E7A5A" stroke-width="0.5" opacity="0.2"/>
  <line x1="150" y1="210" x2="450" y2="210" stroke="#5E7A5A" stroke-width="0.5" opacity="0.2"/>
  <line x1="185" y1="95" x2="415" y2="325" stroke="#5E7A5A" stroke-width="0.5" opacity="0.2"/>
  <line x1="415" y1="95" x2="185" y2="325" stroke="#5E7A5A" stroke-width="0.5" opacity="0.2"/>

  <!-- Ring labels -->
  <text x="300" y="48" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#5E7A5A" opacity="0.6">ADOPT</text>
  <text x="300" y="88" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#5E7A5A" opacity="0.6">TRIAL</text>
  <text x="300" y="128" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#5E7A5A" opacity="0.6">ASSESS</text>
  <text x="300" y="168" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#5E7A5A" opacity="0.6">REVIEW</text>

  <!-- Quadrant labels -->
  <text x="155" y="75" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#c9b082" font-weight="500">FRONTEND</text>
  <text x="445" y="75" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#c9b082" font-weight="500">BACKEND</text>
  <text x="155" y="360" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#c9b082" font-weight="500">INFRA</text>
  <text x="445" y="360" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#c9b082" font-weight="500">DATA</text>

  <!-- FRONTEND dots (upper-left quadrant) -->
  <g filter="url(#dot-glow)">
    <!-- React - outer ring (ADOPT) -->
    <circle cx="215" cy="130" r="10" fill="#61DAFB" opacity="0.9"/>
    <text x="215" y="134" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#0D1117" font-weight="700">R</text>

    <!-- Vite - inner ring (ADOPT) -->
    <circle cx="255" cy="105" r="8" fill="#646CFF" opacity="0.9"/>
    <text x="255" y="109" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="#FFFFFF" font-weight="700">V</text>

    <!-- Tailwind CSS - inner ring -->
    <circle cx="200" cy="165" r="8" fill="#06B6D4" opacity="0.9"/>
    <text x="200" y="169" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="#FFFFFF" font-weight="700">T</text>

    <!-- TanStack Query -->
    <circle cx="240" cy="150" r="6" fill="#FF4154" opacity="0.9"/>

    <!-- React Router -->
    <circle cx="185" cy="145" r="5" fill="#CA4245" opacity="0.9"/>

    <!-- Socket.IO Client -->
    <circle cx="260" cy="145" r="5" fill="#FFFFFF" opacity="0.9"/>

    <!-- React Quill -->
    <circle cx="220" cy="180" r="5" fill="#46C35F" opacity="0.9"/>

    <!-- Axios -->
    <circle cx="245" cy="175" r="4" fill="#5E7A5A" opacity="0.8"/>
  </g>

  <!-- BACKEND dots (upper-right quadrant) -->
  <g filter="url(#dot-glow)">
    <!-- NestJS - outer ring (ADOPT) -->
    <circle cx="385" cy="130" r="10" fill="#E0234E" opacity="0.9"/>
    <text x="385" y="134" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#FFFFFF" font-weight="700">N</text>

    <!-- TypeScript - inner ring -->
    <circle cx="345" cy="105" r="8" fill="#3178C6" opacity="0.9"/>
    <text x="345" y="109" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="#FFFFFF" font-weight="700">TS</text>

    <!-- Mongoose -->
    <circle cx="410" cy="155" r="7" fill="#47A248" opacity="0.9"/>

    <!-- MongoDB -->
    <circle cx="360" cy="160" r="6" fill="#47A248" opacity="0.8"/>

    <!-- JWT -->
    <circle cx="395" cy="175" r="5" fill="#c9b082" opacity="0.9"/>

    <!-- Throttler -->
    <circle cx="375" cy="180" r="4" fill="#5E7A5A" opacity="0.8"/>

    <!-- bcrypt -->
    <circle cx="420" cy="170" r="4" fill="#5E7A5A" opacity="0.8"/>
  </g>

  <!-- INFRA dots (lower-left quadrant) -->
  <g filter="url(#dot-glow)">
    <!-- MongoDB Atlas -->
    <circle cx="215" cy="270" r="8" fill="#47A248" opacity="0.9"/>

    <!-- Node.js -->
    <circle cx="240" cy="250" r="6" fill="#5E7A5A" opacity="0.9"/>

    <!-- Vercel/CD -->
    <circle cx="200" cy="285" r="4" fill="#5E7A5A" opacity="0.8"/>
  </g>

  <!-- DATA dots (lower-right quadrant) -->
  <g filter="url(#dot-glow)">
    <!-- Socket.IO Core -->
    <circle cx="385" cy="270" r="8" fill="#c9b082" opacity="0.9"/>
    <text x="385" y="274" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="#0D1117" font-weight="700">W</text>
  </g>

  <!-- Legend -->
  <g transform="translate(20, 380)">
    <circle cx="0" cy="0" r="4" fill="#5E7A5A" opacity="0.8"/>
    <text x="10" y="4" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#dde8db">= Core Tech</text>
    <circle cx="80" cy="0" r="4" fill="#c9b082" opacity="0.9"/>
    <text x="90" y="4" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#dde8db">= Core WebSockets</text>
    <line x1="160" y1="0" x2="180" y2="0" stroke="#5E7A5A" stroke-width="2" opacity="0.4"/>
    <text x="188" y="4" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#dde8db">Ring = Maturity Level</text>
  </g>
</svg>